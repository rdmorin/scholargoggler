e | rot none"}, {"file": "html/Ryan_D._Morin_IDau0mkAAAAJ_triangle_Cross_Luminari_0.6_transparent_45_wordcloud.html", "label": "Ryan D. Morin | triangle | Cross | Luminari | scale 0.6 | bg transparent | rot 45"}, {"file": "html/Ryan_D._Morin_IDau0mkAAAAJ_triangle_white-on-black_Arial_0.6_black_45_wordcloud.html", "label": "Ryan D. Morin | triangle | white-on-black | Arial | scale 0.6 | bg black | rot 45"}];
    let slides = [...originalSlides];

    let current = 0;
    let playing = true;
    let delayMs = 4000;
    let timer = null;

    const frame = document.getElementById("previewFrame");
    const captionText = document.getElementById("captionText");
    const fileLink = document.getElementById("fileLink");
    const status = document.getElementById("status");
    const playBtn = document.getElementById("playBtn");
    const shuffleModeCheckbox = document.getElementById("shuffleMode");

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function resetSlides() {
      slides = [...originalSlides];
      if (shuffleModeCheckbox.checked) {
        shuffleArray(slides);
      }
      current = 0;
    }

    function render() {
      if (slides.length === 0) {
        captionText.textContent = "No word cloud files found.";
        fileLink.style.display = "none";
        frame.removeAttribute("src");
        status.textContent = "";
        return;
      }

      const slide = slides[current];
      frame.src = slide.file;
      captionText.textContent = slide.label;
      fileLink.href = slide.file;
      fileLink.style.display = "";
      status.textContent = `Showing ${current + 1} of ${slides.length}`;
    }

    function nextSlide() {
      if (slides.length === 0) return;
      current = (current + 1) % slides.length;
      render();
    }

    function prevSlide() {
      if (slides.length === 0) return;
      current = (current - 1 + slides.length) % slides.length;
      render();
    }

    function stopTimer() {
      if (timer !== null) {
        clearInterval(timer);
        timer = null;
      }
    }

    function startTimer() {
      stopTimer();
      if (playing && slides.length > 1) {
        timer = setInterval(nextSlide, delayMs);
      }
    }

    function togglePlay() {
      playing = !playing;
      playBtn.textContent = playing ? "Pause" : "Play";
      startTimer();
    }

    function applyDelay() {
      const val = parseInt(document.getElementById("delayInput").value, 10);
      if (!isNaN(val) && val > 0) {
        delayMs = val * 1000;
        startTimer();
      }
    }

    function reshuffle() {
      resetSlides();
      render();
      startTimer();
    }

    shuffleModeCheckbox.addEventListener("change", function() {
      resetSlides();
      render();
      startTimer();
    });

    resetSlides();
    render();
    startTimer();
  </script>
